<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope for Women Scouts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌸 Hope for Women Scouts</h1>
        <p class="subtitle">Login</p>

        <div id="login-section">
            <select id="role-select">
                <option value="scout">Scout</option>
                <option value="leader">Leader</option>
            </select>
            <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">
            <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">
            <button id="login-btn" class="button">Login</button>
            <p id="error-message" style="color: red; margin-top: 10px;"></p>
        </div>

        <div id="dashboard" style="display: none;">
            <!-- Dashboard will load here -->
        </div>
    </div>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
