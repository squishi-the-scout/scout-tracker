<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requirement Notes — Hope for Women</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="scout-profile.html?name=Aisha" class="back-link">← Back to Aisha's progress</a>
        <h1 id="req-title">Loading...</h1>
        <div id="req-content" class="requirement-summary" style="margin-top: 20px; line-height: 1.6;">
            Loading notes...
        </div>
        <div style="margin-top: 30px; padding: 20px; background: #f0f4eb; border-radius: 16px;">
            <h3>📝 Your notes</h3>
            <textarea id="user-notes" rows="6" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit;" placeholder="Write your personal notes here..."></textarea>
            <button id="save-notes" style="margin-top: 10px; background: #7a8c6a; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer;">Save Notes</button>
        </div>
    </div>
    <script src="script-detail.js"></script>
</body>
</html>
